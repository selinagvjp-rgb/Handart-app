<script>
    // 1. Cấu hình kết nối thật
    const SUPABASE_URL = 'https://cfcyfqhfigejvjqgfdeo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmY3lmcWhmaWdlanZqcWdmZGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODE0MTQsImV4cCI6MjA5Mjk1NzQxNH0.znlrNvmEQtMPZKUFFqCIskAlVekm7ZERCuDJhYctOhc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Hàm đăng nhập thực tế kiểm tra từ bảng 'app_users'
    async function doLogin() {
        const user = document.getElementById('lb-user').value;
        const pass = document.getElementById('lb-pass').value;
        const errEl = document.getElementById('lb-err');

        try {
            const { data, error } = await _supabase
                .from('app_users')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .single();

            if (error || !data) {
                errEl.style.display = 'block';
                errEl.innerText = "Sai tài khoản hoặc mật khẩu!";
                return;
            }

            // Đăng nhập thành công
            localStorage.setItem('handart_user', JSON.stringify(data));
            window.location.reload(); // Load lại để vào màn hình chính
        } catch (e) {
            console.error(e);
            alert("Lỗi kết nối hệ thống!");
        }
    }
